<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>BoutiqueAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root {
  --brand:    #7C6FFF;
  --brand-rgb: 124,111,255;
  --bg:       #0D0A07;
  --surface:  #181310;
  --surface2: #221C18;
  --surface3: #2C2420;
  --border:   rgba(255,255,255,.07);
  --border2:  rgba(255,255,255,.12);
  --text:     #F0E6D3;
  --text2:    #9A8E7E;
  --text3:    #5C5047;
  --cream:    #F5EDD8;
  --ff-head:  'Fraunces', Georgia, serif;
  --ff-body:  'DM Sans', sans-serif;
  --r:        16px;
  --r-sm:     10px;
  --r-lg:     22px;
  --ease:     cubic-bezier(.22,.68,0,1.2);
}

/* ── RESET ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:var(--ff-body); -webkit-font-smoothing:antialiased; }

/* ── LOADING SCREEN ── */
#loading {
  position:fixed; inset:0; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:999; gap:20px;
  transition:opacity .4s ease, visibility .4s ease;
}
#loading.hidden { opacity:0; visibility:hidden; }
.load-ring {
  width:52px; height:52px; border-radius:50%;
  border:2.5px solid rgba(var(--brand-rgb),.15);
  border-top-color:var(--brand);
  animation:spin .9s linear infinite;
}
.load-text { font-family:var(--ff-head); font-size:15px; color:var(--text2); letter-spacing:.04em; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── ERROR STATE ── */
#error-screen {
  position:fixed; inset:0; background:var(--bg);
  display:none; flex-direction:column; align-items:center; justify-content:center;
  z-index:998; gap:14px; padding:40px; text-align:center;
}
#error-screen.show { display:flex; }
.error-icon { font-size:48px; margin-bottom:8px; }
.error-title { font-family:var(--ff-head); font-size:22px; font-weight:400; }
.error-sub { font-size:14px; color:var(--text2); line-height:1.65; max-width:320px; }

/* ── LAYOUT ── */
#app {
  display:flex; flex-direction:column; height:100%; max-width:520px; margin:0 auto;
  position:relative; background:var(--bg);
}

/* ── HEADER ── */
#chat-header {
  flex-shrink:0; padding:14px 16px 12px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:12px;
  position:relative; z-index:10;
  box-shadow:0 2px 20px rgba(0,0,0,.4);
}
.header-avatar {
  width:42px; height:42px; border-radius:13px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--ff-head); font-weight:600; font-size:17px; color:#fff;
  overflow:hidden; position:relative;
  box-shadow:0 4px 12px rgba(0,0,0,.4);
}
.header-avatar img { width:100%; height:100%; object-fit:cover; }
.header-avatar::after {
  content:''; position:absolute; bottom:2px; right:2px;
  width:9px; height:9px; background:#22c55e; border-radius:50%;
  border:2px solid var(--surface);
}
.header-info { flex:1; min-width:0; }
.header-name {
  font-family:var(--ff-head); font-size:16px; font-weight:500;
  color:var(--cream); letter-spacing:-.01em;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.header-sub {
  font-size:11.5px; color:var(--text2); margin-top:1px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.header-status {
  display:flex; align-items:center; gap:5px;
  font-size:11px; color:#22c55e; font-weight:500;
}
.status-dot { width:6px; height:6px; background:#22c55e; border-radius:50%; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── MESSAGES AREA ── */
#messages {
  flex:1; overflow-y:auto; padding:16px 14px 8px;
  display:flex; flex-direction:column; gap:10px;
  scroll-behavior:smooth;
}
#messages::-webkit-scrollbar { width:3px; }
#messages::-webkit-scrollbar-thumb { background:var(--surface3); border-radius:3px; }

/* ── DATE DIVIDER ── */
.date-divider {
  text-align:center; font-size:11px; color:var(--text3);
  position:relative; margin:6px 0;
}
.date-divider::before, .date-divider::after {
  content:''; position:absolute; top:50%; width:30%;
  height:1px; background:var(--border);
}
.date-divider::before { left:0; }
.date-divider::after { right:0; }

/* ── BUBBLES ── */
.msg-wrap {
  display:flex; gap:8px; align-items:flex-end; max-width:88%;
  animation:msgIn .3s var(--ease) both;
}
@keyframes msgIn {
  from { opacity:0; transform:translateY(10px) scale(.97); }
  to   { opacity:1; transform:none; }
}
.msg-wrap.user { margin-left:auto; flex-direction:row-reverse; }
.msg-wrap.agent { margin-right:auto; }

.bubble-avatar {
  width:28px; height:28px; border-radius:9px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:600; color:#fff; overflow:hidden; margin-bottom:2px;
}
.bubble-avatar img { width:100%; height:100%; object-fit:cover; }

.bubble {
  padding:10px 13px; border-radius:18px;
  font-size:14px; line-height:1.55; position:relative;
  max-width:100%;
}
.msg-wrap.agent .bubble {
  background:var(--surface2); color:var(--text);
  border-bottom-left-radius:5px;
  border:1px solid var(--border);
}
.msg-wrap.user .bubble {
  background:var(--brand); color:#fff;
  border-bottom-right-radius:5px;
  box-shadow:0 4px 14px rgba(var(--brand-rgb),.35);
}
.bubble-time {
  font-size:10px; color:var(--text3); margin-top:3px;
  text-align:right;
}
.msg-wrap.agent .bubble-time { text-align:left; }

/* ── IMAGE BUBBLE ── */
.bubble-img {
  max-width:220px; border-radius:14px; overflow:hidden; cursor:pointer;
  border:1px solid var(--border2); box-shadow:0 4px 14px rgba(0,0,0,.4);
}
.bubble-img img { width:100%; display:block; }
.bubble-img-caption {
  padding:7px 10px; font-size:12px; color:var(--text2);
  background:var(--surface2);
}

/* ── TYPING INDICATOR ── */
#typing-indicator {
  display:none; align-items:flex-end; gap:8px; max-width:88%;
  animation:msgIn .3s var(--ease) both;
}
#typing-indicator.show { display:flex; }
.typing-bubble {
  background:var(--surface2); border:1px solid var(--border);
  border-bottom-left-radius:5px; border-radius:18px;
  padding:12px 16px; display:flex; gap:5px; align-items:center;
}
.typing-dot {
  width:7px; height:7px; background:var(--text3); border-radius:50%;
  animation:typingBounce 1.2s infinite;
}
.typing-dot:nth-child(2) { animation-delay:.2s; }
.typing-dot:nth-child(3) { animation-delay:.4s; }
@keyframes typingBounce { 0%,60%,100%{transform:none} 30%{transform:translateY(-5px);background:var(--brand)} }

/* ── TRY-ON BANNER ── */
#tryon-banner {
  flex-shrink:0; margin:0 14px 10px;
  background:linear-gradient(135deg,rgba(var(--brand-rgb),.12),rgba(var(--brand-rgb),.06));
  border:1px solid rgba(var(--brand-rgb),.25); border-radius:var(--r);
  padding:11px 14px; display:flex; align-items:center; gap:12px; cursor:pointer;
  transition:all .2s ease; position:relative; overflow:hidden;
}
#tryon-banner::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(var(--brand-rgb),.1),transparent);
  opacity:0; transition:opacity .2s;
}
#tryon-banner:hover::before, #tryon-banner:active::before { opacity:1; }
.tryon-icon {
  width:36px; height:36px; border-radius:10px; background:rgba(var(--brand-rgb),.2);
  display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0;
}
.tryon-text { flex:1; min-width:0; }
.tryon-title { font-size:13px; font-weight:600; color:var(--cream); }
.tryon-sub { font-size:11.5px; color:var(--text2); margin-top:1px; }
.tryon-arrow { font-size:18px; color:var(--brand); }

/* ── INPUT AREA ── */
#input-area {
  flex-shrink:0; padding:10px 12px 14px;
  background:var(--surface); border-top:1px solid var(--border);
}
.input-row { display:flex; align-items:flex-end; gap:8px; }
#photo-btn {
  width:42px; height:42px; border-radius:12px; flex-shrink:0;
  background:var(--surface2); border:1px solid var(--border2);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:18px; transition:all .15s ease;
}
#photo-btn:hover { background:var(--surface3); border-color:rgba(var(--brand-rgb),.4); }
#photo-btn:active { transform:scale(.93); }
#msg-input {
  flex:1; background:var(--surface2); border:1px solid var(--border2);
  border-radius:14px; padding:11px 14px; color:var(--text);
  font-family:var(--ff-body); font-size:14px; resize:none;
  min-height:42px; max-height:120px; overflow-y:auto; line-height:1.5;
  outline:none; transition:border-color .15s;
}
#msg-input:focus { border-color:rgba(var(--brand-rgb),.5); }
#msg-input::placeholder { color:var(--text3); }
#send-btn {
  width:42px; height:42px; border-radius:12px; flex-shrink:0;
  background:var(--brand); border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s ease; box-shadow:0 4px 12px rgba(var(--brand-rgb),.35);
}
#send-btn:hover { opacity:.9; transform:scale(1.04); }
#send-btn:active { transform:scale(.93); }
#send-btn:disabled { opacity:.4; pointer-events:none; }
#send-btn svg { width:18px; height:18px; }

/* ── IMAGE UPLOAD PREVIEW ── */
#upload-preview {
  display:none; padding:8px 12px 4px;
  animation:slideUp .25s var(--ease);
}
#upload-preview.show { display:block; }
@keyframes slideUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.preview-inner {
  position:relative; display:inline-block; border-radius:10px; overflow:hidden;
  border:2px solid rgba(var(--brand-rgb),.4);
}
.preview-inner img { height:80px; display:block; border-radius:8px; }
.preview-remove {
  position:absolute; top:4px; right:4px; width:22px; height:22px;
  background:rgba(0,0,0,.7); border:none; border-radius:50%; color:#fff;
  font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.preview-label {
  font-size:11px; color:var(--brand); margin-top:4px; font-weight:500;
}

/* ── IMAGE VIEWER OVERLAY ── */
#img-viewer {
  position:fixed; inset:0; background:rgba(0,0,0,.92); z-index:999;
  display:none; align-items:center; justify-content:center; padding:20px;
}
#img-viewer.show { display:flex; }
#img-viewer img { max-width:100%; max-height:90vh; border-radius:12px; object-fit:contain; }
#img-viewer-close {
  position:absolute; top:20px; right:20px; background:rgba(255,255,255,.1);
  border:none; color:#fff; font-size:22px; width:40px; height:40px;
  border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center;
}

/* ── SCROLLBAR FOR INPUT ── */
#msg-input::-webkit-scrollbar { width:3px; }
#msg-input::-webkit-scrollbar-thumb { background:var(--surface3); border-radius:3px; }

/* ── POWERED BY ── */
.powered-by {
  text-align:center; font-size:10.5px; color:var(--text3);
  padding:4px 0 2px; letter-spacing:.02em;
}
.powered-by a { color:var(--text3); text-decoration:none; }
.powered-by a:hover { color:var(--text2); }

/* ── DESKTOP FRAME ── */
@media(min-width:521px) {
  body { background:#07080D; }
  #app {
    margin:0 auto; box-shadow:0 0 0 1px var(--border), 0 32px 80px rgba(0,0,0,.6);
    height:100vh;
  }
}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="load-ring" id="load-ring"></div>
  <div class="load-text">Loading your boutique…</div>
</div>

<!-- Error -->
<div id="error-screen">
  <div class="error-icon">🏪</div>
  <div class="error-title">Agent not found</div>
  <div class="error-sub" id="error-msg">This boutique agent doesn't exist or hasn't been published yet.</div>
</div>

<!-- App -->
<div id="app" style="display:none">

  <!-- Header -->
  <div id="chat-header">
    <div class="header-avatar" id="header-avatar">A</div>
    <div class="header-info">
      <div class="header-name" id="header-name">BoutiqueAI</div>
      <div class="header-sub" id="header-sub">Your personal stylist</div>
    </div>
    <div class="header-status">
      <div class="status-dot"></div>
      Online
    </div>
  </div>

  <!-- Messages -->
  <div id="messages">
    <div class="date-divider">Today</div>
  </div>

  <!-- Typing indicator (inside messages flow) -->
  <div id="typing-indicator" style="padding:0 14px 6px">
    <div class="bubble-avatar" id="typing-avatar">A</div>
    <div class="typing-bubble">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>

  <!-- Try-On Banner -->
  <div id="tryon-banner" onclick="triggerPhotoUpload()">
    <div class="tryon-icon">📸</div>
    <div class="tryon-text">
      <div class="tryon-title">Try on our collection</div>
      <div class="tryon-sub">Upload your photo to see how items look on you</div>
    </div>
    <div class="tryon-arrow">→</div>
  </div>

  <!-- Input Area -->
  <div id="input-area">
    <!-- Image upload preview -->
    <div id="upload-preview">
      <div class="preview-inner">
        <img id="preview-img" src="" alt="upload">
        <button class="preview-remove" onclick="removeUpload()">✕</button>
      </div>
      <div class="preview-label">📸 Photo ready for try-on</div>
    </div>

    <div class="input-row">
      <button id="photo-btn" onclick="triggerPhotoUpload()" title="Upload photo">📷</button>
      <textarea id="msg-input"
        placeholder="Ask about sarees, try-ons, sizes…"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="powered-by">Powered by <a href="https://boutiquesaas.aasaitech.in" target="_blank">BoutiqueAI</a></div>
  </div>
</div>

<!-- Hidden file input -->
<input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFileSelect(this)">

<!-- Image viewer overlay -->
<div id="img-viewer" onclick="this.classList.remove('show')">
  <button id="img-viewer-close" onclick="document.getElementById('img-viewer').classList.remove('show')">✕</button>
  <img id="img-viewer-src" src="" alt="">
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────
const API = 'https://ekbg3nf6b6vr6i3ssxxni3g6ia0jwcwm.lambda-url.ap-southeast-2.on.aws'
const SUBDOMAIN_BASE = 'boutiquesaas.aasaitech.in'

// ── STATE ────────────────────────────────────────────────────────
let agentConfig   = null
let sessionId     = localStorage.getItem('ba_chat_session') || genId()
let uploadUrl     = null   // S3 public URL after direct upload
let uploadBase64  = null   // local preview only
let isSending     = false

localStorage.setItem('ba_chat_session', sessionId)

function genId() {
  return 'sess_' + Math.random().toString(36).slice(2) + Date.now().toString(36)
}

// ── SLUG RESOLUTION ──────────────────────────────────────────────
function getSlug() {
  const hostname = window.location.hostname
  // Dev / preview: ?slug=xxx or ?agent=xxx
  const p = new URLSearchParams(location.search)
  if (p.get('slug'))  return { slug: p.get('slug'), mode: 'slug' }
  if (p.get('agent')) return { slug: p.get('agent'), mode: 'slug' }
  // Subdomain: arun-silkhouse.boutiquesaas.aasaitech.in
  if (hostname.endsWith('.' + SUBDOMAIN_BASE)) {
    return { slug: hostname.replace('.' + SUBDOMAIN_BASE, ''), mode: 'slug' }
  }
  // localhost / pages.dev (dev preview)
  if (hostname === 'localhost' || hostname.endsWith('.pages.dev')) {
    return { slug: p.get('slug') || 'demo', mode: 'slug' }
  }
  // Custom domain
  return { domain: hostname, mode: 'domain' }
}

// ── LOAD AGENT ───────────────────────────────────────────────────
async function loadAgent() {
  const ref = getSlug()
  let url
  if (ref.mode === 'slug') {
    url = `${API}/public/agent/${ref.slug}`
  } else {
    url = `${API}/public/agent/by-domain?domain=${encodeURIComponent(ref.domain)}`
  }

  try {
    const res  = await fetch(url)
    const json = await res.json()
    if (!json.success || !json.data) throw new Error(json.error || 'Agent not found')
    const a = json.data
    agentConfig = a
    applyBranding(a)
    document.getElementById('loading').classList.add('hidden')
    document.getElementById('app').style.display = 'flex'
    // Post welcome message
    setTimeout(() => addAgentMessage(a.welcome_msg || `Hi! I'm ${a.agent_name}. How can I help you today? 😊`), 300)
  } catch(err) {
    document.getElementById('loading').classList.add('hidden')
    document.getElementById('error-msg').textContent = err.message || 'Could not load this boutique.'
    document.getElementById('error-screen').classList.add('show')
  }
}

// ── APPLY BRANDING ───────────────────────────────────────────────
function applyBranding(a) {
  // Brand color
  const color = a.brand_color || '#7C6FFF'
  const rgb   = hexToRgb(color)
  document.documentElement.style.setProperty('--brand', color)
  if (rgb) document.documentElement.style.setProperty('--brand-rgb', `${rgb.r},${rgb.g},${rgb.b}`)

  // Header
  document.getElementById('header-name').textContent    = a.agent_name || 'Your Stylist'
  document.getElementById('header-sub').textContent     = a.business_name || ''
  document.title = `${a.agent_name} — ${a.business_name || 'BoutiqueAI'}`

  // Avatar
  const av = document.getElementById('header-avatar')
  av.style.background = color
  if (a.logo_url) {
    av.innerHTML = `<img src="${a.logo_url}" alt="${a.agent_name}">`
  } else {
    av.textContent = (a.agent_name || 'A')[0].toUpperCase()
  }

  // Typing avatar
  const ta = document.getElementById('typing-avatar')
  ta.style.background = color
  if (a.logo_base64) ta.innerHTML = `<img src="${a.logo_base64}" alt="">`
  else ta.textContent = (a.agent_name || 'A')[0].toUpperCase()

  // Placeholder
  const cat = { sarees:'sarees, silk, drapes', western:'dresses, tops, outfits', jewellery:'necklaces, earrings', footwear:'heels, sandals', kids:'kids wear' }
  document.getElementById('msg-input').placeholder =
    `Ask about ${cat[a.category] || 'our collection'}, sizes, try-ons…`
}

function hexToRgb(hex) {
  const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex)
  return r ? { r:parseInt(r[1],16), g:parseInt(r[2],16), b:parseInt(r[3],16) } : null
}

// ── MESSAGING ────────────────────────────────────────────────────
function nowTime() {
  return new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', hour12:true })
}

function addAgentMessage(text) {
  const a = agentConfig
  const wrap = document.createElement('div')
  wrap.className = 'msg-wrap agent'

  const avatarColor = a?.brand_color || 'var(--brand)'
  const avatarLetter = (a?.agent_name || 'A')[0].toUpperCase()
  const logoSrc = a?.logo_url
  const avatarHtml = logoSrc
    ? `<img src="${logoSrc}" alt="">`
    : avatarLetter

  wrap.innerHTML = `
    <div class="bubble-avatar" style="background:${avatarColor}">${avatarHtml}</div>
    <div>
      <div class="bubble">${escHtml(text)}</div>
      <div class="bubble-time">${nowTime()}</div>
    </div>`
  document.getElementById('messages').appendChild(wrap)
  scrollToBottom()
}

function addUserMessage(text, imageBase64 = null, imageMime = null) {
  const wrap = document.createElement('div')
  wrap.className = 'msg-wrap user'

  let inner = ''
  if (imageBase64) {
    inner += `<div class="bubble-img" onclick="viewImage('${imageBase64}')">
      <img src="${imageBase64}" alt="Try-on photo">
      <div class="bubble-img-caption">📸 Try-on photo</div>
    </div>`
  }
  if (text) {
    inner += `<div class="bubble">${escHtml(text)}</div>`
  }
  inner += `<div class="bubble-time">${nowTime()}</div>`

  wrap.innerHTML = inner
  document.getElementById('messages').appendChild(wrap)
  scrollToBottom()
}

function showTyping()  {
  document.getElementById('typing-indicator').classList.add('show')
  scrollToBottom()
}
function hideTyping()  { document.getElementById('typing-indicator').classList.remove('show') }

function scrollToBottom() {
  const el = document.getElementById('messages')
  setTimeout(() => el.scrollTop = el.scrollHeight, 60)
}

// ── SEND MESSAGE ─────────────────────────────────────────────────
async function sendMessage() {
  if (isSending) return
  const input   = document.getElementById('msg-input')
  const text    = input.value.trim()
  const hasImg  = !!uploadUrl
  if (!text && !hasImg) return

  isSending = true
  document.getElementById('send-btn').disabled = true

  // Show user message with local preview
  addUserMessage(text, uploadBase64, null)
  input.value = ''
  autoResize(input)
  const imgUrl  = uploadUrl
  removeUpload()
  showTyping()

  try {
    const res  = await fetch(`${API}/public/chat`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        agent_id:   agentConfig._id,
        session_id: sessionId,
        message:    text || '',
        image_url:  imgUrl || null,
      }),
    })
    const json = await res.json()
    hideTyping()
    if (json.success && json.data?.reply) {
      addAgentMessage(json.data.reply)
      // If a new session_id is returned, store it
      if (json.data.session_id) {
        sessionId = json.data.session_id
        localStorage.setItem('ba_chat_session', sessionId)
      }
    } else {
      addAgentMessage(json.error || 'Sorry, I had trouble responding. Please try again.')
    }
  } catch(e) {
    hideTyping()
    addAgentMessage('Sorry, something went wrong. Please check your connection and try again.')
  } finally {
    isSending = false
    document.getElementById('send-btn').disabled = false
    input.focus()
  }
}

// ── INPUT HELPERS ────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault()
    sendMessage()
  }
  updateSendBtn()
}

function autoResize(el) {
  el.style.height = 'auto'
  el.style.height = Math.min(el.scrollHeight, 120) + 'px'
  updateSendBtn()
}

function updateSendBtn() {
  const text = document.getElementById('msg-input').value.trim()
  document.getElementById('send-btn').disabled = !text && !uploadUrl
}

// ── PHOTO UPLOAD ─────────────────────────────────────────────────
function triggerPhotoUpload() {
  document.getElementById('file-input').click()
}

async function handleFileSelect(input) {
  const file = input.files[0]
  if (!file) return
  if (file.size > 5 * 1024 * 1024) {
    alert('Please choose an image under 5MB.')
    return
  }
  input.value = ''

  // Show local preview immediately while uploading
  const reader = new FileReader()
  reader.onload = e => {
    uploadBase64 = e.target.result
    document.getElementById('preview-img').src = uploadBase64
    document.getElementById('upload-preview').classList.add('show')
    document.getElementById('preview-label').textContent = '📸 Uploading…'
    scrollToBottom()
  }
  reader.readAsDataURL(file)

  try {
    // Step 1 — get presigned PUT URL from backend
    const presignRes = await fetch(`${API}/public/upload/presign`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, content_type: file.type }),
    })
    const presignJson = await presignRes.json()
    if (!presignJson.success) throw new Error(presignJson.error || 'Presign failed')
    const { upload_url, public_url } = presignJson.data

    // Step 2 — upload directly to S3
    await fetch(upload_url, {
      method:  'PUT',
      headers: { 'Content-Type': file.type },
      body:    file,
    })

    // Step 3 — store public URL
    uploadUrl = public_url
    document.getElementById('preview-label').textContent = '📸 Photo ready for try-on'
    document.getElementById('send-btn').disabled = false
  } catch(e) {
    console.error('Upload failed:', e.message)
    document.getElementById('preview-label').textContent = '❌ Upload failed — tap to retry'
    uploadUrl = null
    uploadBase64 = null
    document.getElementById('upload-preview').classList.remove('show')
  }
}

function removeUpload() {
  uploadUrl    = null
  uploadBase64 = null
  document.getElementById('upload-preview').classList.remove('show')
  document.getElementById('preview-img').src = ''
  updateSendBtn()
}

// ── IMAGE VIEWER ─────────────────────────────────────────────────
function viewImage(src) {
  document.getElementById('img-viewer-src').src = src
  document.getElementById('img-viewer').classList.add('show')
}

// ── UTILS ────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/\n/g,'<br>')
}

// ── INIT ─────────────────────────────────────────────────────────
loadAgent()
</script>
